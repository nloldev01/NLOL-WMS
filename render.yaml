services:
  - type: web
    name: nlol-wms
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nlol-wms-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: RECIPE_ENCRYPTION_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: nlol-wms-db
    plan: free
    databaseName: nlol_db
    user: nlol_user
